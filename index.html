<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberano Builder V13 | Pedidos con Delivery</title>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .builder-container { max-width: 850px; width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        h1 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; font-size: 1.1rem; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; background: var(--glass); }
        label { color: var(--gold); font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: #fff; outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-generar { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.4s; font-size: 0.9rem;}
        .btn-generar:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        #codigo_salida { width: 100%; height: 250px; margin-top: 20px; background: #050505; color: #00ff41; font-family: monospace; border: 1px solid #444; padding: 10px; border-radius: 10px; display: none; font-size: 11px; }
    </style>
</head>
<body>

    <div class="builder-container">
        <h1>🛒 BUILDER V13 | CHATBOT PEDIDOS + DELIVERY</h1>
        
        <div class="section">
            <label>Nombre del Comercio:</label>
            <input type="text" id="nombre_comercio" placeholder="Ej: El Jalapeño">
            <label>WhatsApp Pedidos (Sin el +):</label>
            <input type="text" id="ws_num" placeholder="5493764362698">
        </div>

        <button class="btn-generar" onclick="fabricarCodigoDelivery()">Generar Bot de Pedidos Completo 🚀</button>
        <textarea id="codigo_salida" readonly></textarea>
    </div>

<script>
    function fabricarCodigoDelivery() {
        const nombre = document.getElementById('nombre_comercio').value || "EL COMERCIO";
        const ws = document.getElementById('ws_num').value;
        const avatar = "https://i.ibb.co/pjL8062t/ei-1776373504277-removebg-preview.png";

        if(!ws) return alert("Falta el WhatsApp de destino.");

        const scriptCodigo = `<div id="sob_p_del">
    <style>
        #sob_p_del * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        #sob_p_del #p-launch { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #000; border: 2px solid #D4AF37; border-radius: 50%; cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 25px rgba(0,0,0,0.6); }
        #sob_p_del #p-launch img { width: 70%; height: 70%; object-fit: contain; }
        #sob_p_del .win-d { display: none; position: fixed; bottom: 95px; right: 20px; width: 360px; max-width: calc(100% - 40px); border: 2px solid #D4AF37; padding: 20px; border-radius: 25px; background: #000; color: white; box-shadow: 0 10px 50px #000; z-index: 9998; animation: upD 0.3s ease; }
        @keyframes upD { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #sob_p_del .h-d { display:flex; align-items:center; gap:12px; border-bottom:1px solid #222; padding-bottom:12px; position: relative; margin-bottom:15px; }
        #sob_p_del .img-h { width:45px; height:45px; border-radius:50%; border:1px solid #D4AF37; }
        #sob_p_del .cl-d { position: absolute; right: 0; top: 0; cursor: pointer; color: #D4AF37; font-size: 1.5rem; }
        #sob_p_del .box-d { height:260px; overflow-y:auto; margin-bottom:15px; }
        #sob_p_del .msg-d { background:rgba(212,175,55,0.08); padding:12px; border-radius:15px; border-left:3px solid #D4AF37; margin-bottom:12px; font-size:0.9rem; line-height:1.4; }
        #sob_p_del .in-d { width:100%; padding:14px; border:1px solid #D4AF37; border-radius:12px; background:#000; color:white; margin-bottom:10px; outline:none; font-size:15px; }
        #sob_p_del .btn-d { width:100%; padding:16px; background:#D4AF37; border:none; border-radius:12px; color:#000; font-weight:bold; cursor:pointer; text-transform:uppercase; transition: 0.3s; }
        #sob_p_del .footer-d { text-align:center; font-size:0.55rem; color:#444; margin-top:10px; letter-spacing: 1px; text-transform: uppercase;}
    </style>
    <div id="p-launch" onclick="tk()"><img src="${avatar}"></div>
    <div class="win-d" id="w-d">
        <div class="h-d">
            <img src="${avatar}" class="img-h">
            <div>
                <div style="font-weight:bold; font-size:0.9rem;">Toma Pedidos</div>
                <div style="font-size:0.6rem; color:#00ff41;">● Online para ${nombre}</div>
            </div>
            <span class="cl-d" onclick="tk()">×</span>
        </div>
        <div id="b-d" class="box-d"></div>
        <div id="a-d">
            <input type="text" id="n_d" class="in-d" placeholder="¿Tu nombre?">
            <button class="btn-d" onclick="p1()">Siguiente</button>
        </div>
        <div class="footer-d">Portaldigitalsoft | Pedidos Inteligentes</div>
    </div>
    <script>
        let st=1, cli={n:'', p:'', d:''};
        const bx=document.getElementById('b-d'), wn=document.getElementById('w-d');
        function tk(){ wn.style.display=(wn.style.display==='block')?'none':'block'; if(bx.children.length===0) ini(); }
        function ad(t){ const d=document.createElement('div'); d.className='msg-d'; d.innerHTML=t; bx.appendChild(d); bx.scrollTop=bx.scrollHeight; }
        function ini(){ ad("¡Hola! Soy el asistente de pedidos de <b>${nombre}</b>. ¿Cuál es tu nombre?"); }
        
        function p1(){
            const v=document.getElementById('n_d').value; if(!v) return;
            cli.n=v; ad("Perfecto <b>"+v+"</b>. ¿Qué te gustaría pedir hoy? (Detalla productos y cantidades)");
            document.getElementById('a-d').innerHTML='<textarea id="p_d" class="in-d" style="height:70px;resize:none;" placeholder="Ej: 2 Hamburguesas completas..."></textarea><button class="btn-d" onclick="p2()">Siguiente</button>';
        }

        function p2(){
            const v=document.getElementById('p_d').value; if(!v) return;
            cli.p=v; ad("¡Entendido! Por último, ¿a qué <b>dirección</b> enviamos el pedido?");
            document.getElementById('a-d').innerHTML='<input type="text" id="d_d" class="in-d" placeholder="Calle, número y barrio..."><button class="btn-d" onclick="fin()">Enviar Pedido</button>';
        }

        function fin(){
            const v=document.getElementById('d_d').value; if(!v) return;
            cli.d=v;
            let m = "🛒 *NUEVO PEDIDO - ${nombre}*\\n\\n";
            m += "Mi nombre es *"+cli.n+"*, quiero pedir *"+cli.p+"* y que me lo envíen a *"+cli.d+"*.\\n\\n";
            m += "Quiero saber el total incluido el Costo del delivery, muchas gracias. 🙏\\n\\n";
            m += "🤖 _Gestionado por Pedidos Inteligentes_";
            
            ad("🚀 <b>¡Listo!</b> Abriendo WhatsApp...");
            setTimeout(()=>window.open("https://wa.me/${ws}?text="+encodeURIComponent(m.replace(/\\\\n/g, '\\n'))), 1000);
        }
    <\/script>
</div>`;
        
        const out = document.getElementById('codigo_salida');
        out.value = scriptCodigo;
        out.style.display = 'block';
        out.select();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberano Builder V13 | Chatbot Pedidos Pro</title>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .builder-container { max-width: 850px; width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        h1 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; font-size: 1.1rem; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; background: var(--glass); }
        label { color: var(--gold); font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); background: #000; color: #fff; outline: none; margin-bottom: 12px; font-size: 14px; }
        .btn-generar { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.4s; font-size: 0.9rem;}
        .btn-generar:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        #codigo_salida { width: 100%; height: 250px; margin-top: 20px; background: #050505; color: #00ff41; font-family: monospace; border: 1px solid #444; padding: 10px; border-radius: 10px; display: none; font-size: 11px; }
    </style>
</head>
<body>

    <div class="builder-container">
        <h1>🛒 BUILDER V13 | CHATBOT PEDIDOS (FLOAT)</h1>
        
        <div class="section">
            <label>Nombre del Comercio:</label>
            <input type="text" id="nombre_comercio" placeholder="Ej: Pizzería Roma">
            <label>WhatsApp Pedidos (Sin el +):</label>
            <input type="text" id="ws_num" placeholder="5493764362698">
        </div>

        <button class="btn-generar" onclick="fabricarCodigoPedidos()">Generar Bot de Pedidos 🚀</button>
        <textarea id="codigo_salida" readonly></textarea>
    </div>

<script>
    function fabricarCodigoPedidos() {
        const nombre = document.getElementById('nombre_comercio').value || "COMERCIO";
        const ws = document.getElementById('ws_num').value;
        const avatar = "https://i.ibb.co/pjL8062t/ei-1776373504277-removebg-preview.png";

        if(!ws) return alert("Falta el WhatsApp de destino.");

        const scriptCodigo = `<div id="sob_pedidos">
    <style>
        #sob_pedidos * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        #sob_pedidos #pedidos-launcher { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; background: #000; border: 2px solid #D4AF37; border-radius: 50%; cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 25px rgba(0,0,0,0.6); transition: 0.3s; }
        #sob_pedidos #pedidos-launcher:hover { transform: scale(1.1); }
        #sob_pedidos #pedidos-launcher img { width: 70%; height: 70%; object-fit: contain; }
        #sob_pedidos .win-p { display: none; position: fixed; bottom: 95px; right: 20px; width: 360px; max-width: calc(100% - 40px); border: 2px solid #D4AF37; padding: 20px; border-radius: 25px; background: #000; color: white; box-shadow: 0 10px 50px #000; z-index: 9998; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        #sob_pedidos .chat-h { display:flex; align-items:center; gap:12px; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:10px; position: relative; }
        #sob_pedidos .bot-img-h { width:45px; height:45px; border-radius:50%; border:1px solid #D4AF37; }
        #sob_pedidos .close-p { position: absolute; right: 0; top: 0; cursor: pointer; color: #D4AF37; font-size: 1.5rem; }
        #sob_pedidos .box-p { height:280px; overflow-y:auto; margin-bottom:15px; display:flex; flex-direction:column; scroll-behavior: smooth; }
        #sob_pedidos .msg-p { background:rgba(212,175,55,0.1); padding:12px; border-radius:15px; border-left:3px solid #D4AF37; margin-bottom:10px; font-size:0.9rem; }
        #sob_pedidos .in-p { width:100%; padding:14px; border:1px solid #D4AF37; border-radius:12px; background:#000; color:white; margin-bottom:10px; outline:none; }
        #sob_pedidos .btn-p { width:100%; padding:16px; background:#D4AF37; border:none; border-radius:12px; color:#000; font-weight:bold; cursor:pointer; text-transform:uppercase; }
        #sob_pedidos .footer-p { text-align:center; font-size:0.55rem; color:#444; margin-top:10px; letter-spacing: 1px; }
    </style>
    <div id="pedidos-launcher" onclick="togglePed()"><img src="${avatar}"></div>
    <div class="win-p" id="win-ped">
        <div class="chat-h">
            <img src="${avatar}" class="bot-img-h">
            <div>
                <div style="font-weight:bold; font-size:0.9rem;">Toma Pedidos</div>
                <div style="font-size:0.6rem; color:#00ff41;">● Online para ${nombre}</div>
            </div>
            <span class="close-p" onclick="togglePed()">×</span>
        </div>
        <div id="box-ped" class="box-p"></div>
        <div id="area-ped">
            <input type="text" id="ped_name" class="in-p" placeholder="¿A nombre de quién el pedido?">
            <button class="btn-p" onclick="paso1()">Siguiente</button>
        </div>
        <div class="footer-p">Portaldigitalsoft | Pedidos Inteligentes</div>
    </div>
    <script>
        let p_pas=1, p_cli={n:'', d:''};
        const p_box=document.getElementById('box-ped'), p_win=document.getElementById('win-ped');
        function togglePed(){ p_win.style.display=(p_win.style.display==='block')?'none':'block'; if(p_box.children.length===0) p_init(); }
        function p_add(t){ const d=document.createElement('div'); d.className='msg-p'; d.innerHTML=t; p_box.appendChild(d); p_box.scrollTop=p_box.scrollHeight; }
        function p_init(){ p_add("¡Hola! Soy el asistente de pedidos de <b>${nombre}</b>. ¿Cuál es tu nombre?"); }
        function paso1(){
            const i=document.getElementById('ped_name'); if(!i.value) return;
            p_cli.n=i.value;
            p_add("Perfecto <b>"+p_cli.n+"</b>. ¿Qué te gustaría pedir hoy? (Detalla cantidades)");
            document.getElementById('area-ped').innerHTML='<textarea id="ped_det" class="in-p" style="height:80px;resize:none;" placeholder="Ej: 2 Pizzas Muzzarella..."></textarea><button class="btn-p" onclick="p_final()">Enviar Pedido</button>';
        }
        function p_final(){
            const t=document.getElementById('ped_det').value; if(!t) return;
            let m = "🛒 *NUEVO PEDIDO - ${nombre}*\\n\\n*Cliente:* "+p_cli.n+"\\n*Detalle:* "+t+"\\n\\n🤖 *Pedido gestionado por IA*";
            p_add("🚀 Procesando pedido...");
            setTimeout(()=>window.open("https://wa.me/${ws}?text="+encodeURIComponent(m.replace(/\\\\n/g, '\\n'))), 1000);
        }
    <\/script>
</div>`;
        
        const out = document.getElementById('codigo_salida');
        out.value = scriptCodigo;
        out.style.display = 'block';
        out.select();
    }
</script>
</body>
</html>
